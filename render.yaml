services:
  - type: web
    name: orby
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: APP_DOMAIN
        value: getorby.io
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: PHANTOM_SECRET_KEY
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: ORBIT_ECOSYSTEM_DEV_URL
        value: https://orbitstaffing.io/api/ecosystem
      - key: ORBIT_API_KEY
        sync: false
      - key: ORBIT_API_SECRET
        sync: false
